<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>File Store Bot</title>
    <style>
        body {
            font-family: system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            margin: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .hidden {
            display: none;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: green;
            font-size: 48px;
            margin: 20px 0;
        }
        .error {
            color: red;
            font-size: 48px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="loader"></div>
            <div>Loading...</div>
        </div>
        <div id="adButtons" class="hidden">
            <button onclick="showRewarded()">🎁 Watch Ad & Get File</button>
        </div>
        <div id="success" class="hidden">
            <div class="success">✅</div>
            <div>Ad completed! You will receive your file.</div>
        </div>
        <div id="error" class="hidden">
            <div class="error">❌</div>
            <div>Something went wrong. Please try again.</div>
        </div>
    </div>

    <script src='//libtl.com/sdk.js' data-zone='10823122' data-sdk='show_10823122'></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Get file code from URL parameter
        let fileCode = tg.initDataUnsafe.start_param || 'unknown';
        
        console.log('File code:', fileCode);
        console.log('Init data:', tg.initDataUnsafe);
        
        function sendToBot(status, fileCode) {
            try {
                let data = JSON.stringify({
                    status: status,
                    file_code: fileCode
                });
                console.log('Sending to bot:', data);
                tg.sendData(data);
                console.log('Sent successfully');
            } catch(e) {
                console.log('Send error:', e);
            }
        }
        
        function showRewarded() {
            console.log('Show rewarded called');
            
            document.getElementById('adButtons').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            
            try {
                // Check if show_10823122 exists
                if (typeof show_10823122 === 'undefined') {
                    console.error('show_10823122 is not defined');
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error').classList.remove('hidden');
                    setTimeout(() => tg.close(), 2000);
                    return;
                }
                
                // Show Monetag ad
                show_10823122()
                    .then(() => {
                        console.log('Ad completed successfully');
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('success').classList.remove('hidden');
                        
                        // Send completion to bot
                        sendToBot('ad_completed', fileCode);
                        
                        // Close app after 2 seconds
                        setTimeout(() => {
                            tg.close();
                        }, 2000);
                    })
                    .catch((error) => {
                        console.error('Ad error:', error);
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('error').classList.remove('hidden');
                        sendToBot('ad_error', fileCode);
                        setTimeout(() => tg.close(), 2000);
                    });
            } catch(e) {
                console.error('Error in showRewarded:', e);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
                setTimeout(() => tg.close(), 2000);
            }
        }
        
        // Show ad button after loading
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('adButtons').classList.remove('hidden');
            console.log('Ready, showing ad button');
        }, 1000);
    </script>
</body>
</html>
